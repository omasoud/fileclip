<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FileClip</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="page-shell" aria-busy="false">
      <section class="app-card" aria-labelledby="appTitle">
        <header class="app-header">
          <div class="title-group">
            <div class="title-row">
              <h1 id="appTitle">FileClip</h1>
              <span class="version" id="appVersion">v...</span>
            </div>
            <p class="mode-subtitle" id="modeSubtitle">Loading launch configuration.</p>
          </div>
          <div class="mode-badge mode-loading" id="modeBadge">Loading</div>
        </header>

        <input id="fileInput" type="file" hidden>
        <section
          class="file-zone is-empty"
          id="dropZone"
          role="button"
          tabindex="0"
          aria-label="Drop one file here or choose a file"
        ></section>

        <section class="status status-neutral" id="status" role="status" aria-live="polite">
          Loading FileClip...
        </section>

        <section class="actions" aria-label="FileClip actions">
          <div class="primary-actions">
            <button type="button" class="action-button" id="pasteButton">
              <span class="button-icon" aria-hidden="true">P</span>
              <span>Paste from clipboard</span>
            </button>
            <button type="button" class="action-button action-accent" id="copyButton" disabled>
              <span class="button-icon" aria-hidden="true">C</span>
              <span>Copy to clipboard</span>
            </button>
          </div>
          <button type="button" class="action-button action-download" id="downloadButton" disabled>
            <span class="button-icon" aria-hidden="true">D</span>
            <span>Download file</span>
          </button>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
